<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoJadwalKu - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mobile-app login-screen">
        <div class="login-content">
            <div class="logo-container">
                <i class="fa-regular fa-calendar-check logo-icon"></i>
            </div>
            
            <h1 class="app-title">InfoJadwalKu</h1>
            <p class="app-subtitle">Kelola Jadwalmu Lebih Cerdas & Mudah</p>

            <div class="login-form">
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" placeholder="Masukkan Email Siswa" id="emailInput">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Kata Sandi" id="passwordInput">
                </div>
                
                <button class="btn-login" id="loginBtn">Masuk Sekarang</button>
                
                <div class="divider"><span>ATAU</span></div>
                
                <button class="btn-google" id="googleLoginBtn">
                    <i class="fa-brands fa-google"></i> Masuk dengan Google
                </button>
            </div>
        </div>
    </div>

   <script>
        document.getElementById('loginBtn').addEventListener('click', function() {
            // Ambil apa yang diketik user di kolom email
            const emailInput = document.getElementById('emailInput').value;
            
            // Jika kosong, kita beri nama default. Jika ada, kita ambil kata sebelum simbol '@'
            let namaUser = "Siswa";
            let emailUser = "siswa@sekolah.sch.id";
            
            if (emailInput !== "") {
                emailUser = emailInput;
                // Pecah teks berdasarkan @, ambil bagian depan, dan jadikan huruf besar di awal
                let namaMentah = emailInput.split('@')[0];
                namaUser = namaMentah.charAt(0).toUpperCase() + namaMentah.slice(1);
            }

            // Simpan status login, nama, dan email ke Ingatan Browser
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', namaUser);
            localStorage.setItem('userEmail', emailUser);
            
            // Berpindah ke halaman Beranda
            window.location.href = 'index.html';
        });

        // Untuk tombol Google, kita buat nama simulasi saja
        document.getElementById('googleLoginBtn').addEventListener('click', function() {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', 'Pengguna Google');
            localStorage.setItem('userEmail', 'google@akun.com');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
